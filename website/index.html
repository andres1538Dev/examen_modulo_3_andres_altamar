<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Terraform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #232F3E, #FF9900);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .aws-badge {
            background: #FF9900;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 30px;
        }

        h1 {
            color: #232F3E;
            font-size: 28px;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #FF9900;
            border-radius: 8px;
            padding: 20px 25px;
            margin: 15px 0;
            text-align: left;
        }

        .info-box .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-box .value {
            font-size: 18px;
            color: #232F3E;
            font-weight: 600;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }

        .terraform-badge {
            background: #7B42BC;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">

        <div class="logo">☁️</div>
        <div class="aws-badge">Amazon S3 · Static Website Hosting</div>

        <h1>🎓 Bienvenido al Examen Terraform</h1>

        <div class="info-box">
            <div class="label">👤 Nombre del Estudiante</div>
            <div class="value">Andres Altamar</div>
        </div>

        <div class="info-box">
            <div class="label">📅 Fecha Actual</div>
            <div class="value" id="fecha"></div>
        </div>

        <div class="info-box">
            <div class="label">☁️ Infraestructura</div>
            <div class="value">Desplegado con Terraform en AWS S3</div>
        </div>

        <div class="footer">
            Módulo 3 · Examen Final
            <br>
            <span class="terraform-badge">⚡ Terraform IaC</span>
        </div>

    </div>

    <script>
        const fecha = new Date();
        const opciones = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        };
        document.getElementById('fecha').textContent =
            fecha.toLocaleDateString('es-ES', opciones);
    </script>
</body>
</html>
