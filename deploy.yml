name: Terraform Infra Deploy

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Credenciales de AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Instalar Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 4. Inicializar directorio (Descarga providers y configura backend)
      - name: Terraform Init
        run: terraform init

      # 5. Verificar formato del código
      - name: Terraform Format
        run: terraform fmt -check

      # 6. Validación de sintaxis
      - name: Terraform Validate
        run: terraform validate

      # 7. Plan de ejecución (Se ejecuta solo en Pull Requests)
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan

      # 8. Aplicar cambios (Se ejecuta solo al hacer push/merge a main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve